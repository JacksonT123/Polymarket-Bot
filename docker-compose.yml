version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: polymarket_bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d polymarket_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://bot:${DB_PASSWORD:-changeme}@db:5432/polymarket_bot
      TRADING_MODE: ${TRADING_MODE:-PAPER}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      KILLSWITCH: ${KILLSWITCH:-}
      TIER_OVERRIDE: ${TIER_OVERRIDE:-}
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
    command: ["uv", "run", "polymarket-bot", "start"]

volumes:
  pgdata:
